services:
  mongo:
    image: mongo:7
    container_name: collab-doc-store-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
    container_name: collab-doc-store-backend
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017}
      DATABASE_NAME: ${DATABASE_NAME:-collab_docs}
      PORT: ${PORT:-4000}
      SEED_DOCUMENT_COUNT: ${SEED_DOCUMENT_COUNT:-1000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:4173}
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000/api}
    container_name: collab-doc-store-frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000/api}
    depends_on:
      backend:
        condition: service_started
    ports:
      - "4173:80"

volumes:
  mongo_data:
